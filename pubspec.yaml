name: acepool
description: "AcePool - Pool Game App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  geolocator: ^14.0.2
  shared_preferences: ^2.5.3

  # State management (MVI pattern)
  flutter_bloc: ^9.0.0
  equatable: ^2.0.5

  # Navigation
  go_router: ^15.1.0

  # Dependency injection
  get_it: ^8.0.3
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.5.0
  http: ^1.2.0

  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.0
  validifydart: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
