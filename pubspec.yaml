name: acepool
description: "AcePool - Pool Game App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.0

  # State management (MVI pattern)
  flutter_bloc: ^9.0.0
  equatable: ^2.0.5

  # Navigation
  go_router: ^15.1.0

  # Dependency injection
  get_it: ^8.0.3
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.3
  http: ^1.2.0

  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.0
  validifydart: ^0.3.0
  shared_preferences: ^2.3.3
  record: ^7.1.1
  audioplayers: ^6.1.0
  path_provider: ^2.1.5

  # Functional programming
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
